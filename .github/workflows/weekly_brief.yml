name: Weekly Marketing Brief

on:
  schedule:
    # Every Monday at 9am UTC
    - cron: '0 9 * * 1'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  generate_brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-cloud-bigquery groq requests python-dotenv supabase pyarrow

      - name: Create credentials file
        run: |
          echo '${{ secrets.GCLOUD_CREDENTIALS }}' > /tmp/gcloud_credentials.json

      - name: Run brief generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud_credentials.json
        run: |
          python brief_generator.py
